name: Convert to Astro & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install conversion dependencies
        run: |
          cd scripts
          npm install @supabase/supabase-js

      - name: Run conversion script
        env:
          SUPABASE_URL: "https://dkwffdnrailtqvrxiulw.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrd2ZmZG5yYWlsdHF2cnhpdWx3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTg3MTksImV4cCI6MjA4OTU5NDcxOX0.m3Vpw7noB1-thgm7yMzS1Y4lz7ynaND2yVMI6ydn-s4"
        run: node scripts/convert-to-astro.mjs

      - name: Install Astro dependencies
        run: |
          cd _astro-build
          npm install

      - name: Build Astro
        run: |
          cd _astro-build
          npm run build

      - name: Deploy to deploy branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_astro-build/dist
          publish_branch: deploy
          force_orphan: true
          commit_message: "Deploy: ${{ github.sha }}"
